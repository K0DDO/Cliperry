# Cliperry — safe deploy to shared VPS (/opt/cliperry only)
#
# Does NOT touch: briefly, moex-bot, Amnezia VPN, other containers, firewall, volumes of other apps.
#
# Secrets required:
#   VPS_HOST, VPS_USER, VPS_SSH_KEY
#
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cliperry-deploy
  cancel-in-progress: false

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: test
          load: true
          tags: cliperry-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run unit tests
        run: |
          docker run --rm \
            -e APP_ENV=test \
            -e SECRET_KEY=ci-test-secret-key-at-least-32-chars \
            -e ADMIN_PASSWORD=ci-admin-password-ok \
            -e ENABLE_WORKER_TEST=true \
            cliperry-test:ci \
            pytest -q -m unit --maxfail=1

  deploy:
    name: Deploy Cliperry (VPS)
    needs: test
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [[ -n "${VPS_HOST_KEY:-}" ]]; then
            printf '%s\n' "$VPS_HOST_KEY" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy over SSH (Cliperry only)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          ENABLE_BOT: ${{ vars.ENABLE_BOT }}
        run: |
          set -euo pipefail
          : "${VPS_HOST:?VPS_HOST secret missing}"
          : "${VPS_USER:?VPS_USER secret missing}"

          # Never print key material. Only connection metadata.
          echo "Connecting as ${VPS_USER}@${VPS_HOST} → /opt/cliperry"

          # Pass ENABLE_BOT into the remote shell without embedding secrets.
          ssh -o IdentitiesOnly=yes -o BatchMode=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "export ENABLE_BOT=$(printf %q "${ENABLE_BOT:-false}"); bash -s" <<'REMOTE'
          set -euo pipefail

          echo "==> Identity check"
          whoami
          id -nG

          echo "==> Enter project root"
          cd /opt/cliperry || { echo "ERROR: /opt/cliperry missing"; exit 1; }
          pwd

          case "$(pwd -P)" in
            /opt/cliperry) ;;
            *) echo "ERROR: refused path $(pwd -P)"; exit 1 ;;
          esac

          chmod +x scripts/vps-deploy.sh
          ./scripts/vps-deploy.sh
          REMOTE

      - name: Public readiness probe (optional)
        if: ${{ vars.HEALTHCHECK_URL != '' }}
        continue-on-error: true
        env:
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          URL="${HEALTHCHECK_URL%/}"
          echo "Probing ${URL}/ready"
          for _ in $(seq 1 12); do
            if curl -fsS "${URL}/ready"; then
              echo
              echo "Public healthcheck OK"
              exit 0
            fi
            sleep 5
          done
          echo "Public probe failed (non-fatal)" >&2
          exit 1
