# Cliperry CD
# push main → build → deploy VPS → healthcheck
name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cliperry-backend

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          IMAGE="${IMAGE,,}"
          TAG_SHA="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          {
            echo "image=${IMAGE}:${TAG_SHA}"
            echo "image_latest=${IMAGE}:latest"
            echo "tag_sha=${TAG_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: test
          load: true
          tags: cliperry-test:ci
          cache-from: type=gha

      - name: Unit tests
        run: |
          docker run --rm \
            -e APP_ENV=test \
            -e SECRET_KEY=ci-test-secret-key-at-least-32-chars \
            -e ADMIN_PASSWORD=ci-admin-password-ok \
            -e ENABLE_WORKER_TEST=true \
            cliperry-test:ci \
            pytest -q -m unit --maxfail=1

  deploy:
    name: Deploy VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          PORT="${VPS_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync repository to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          rsync -az --delete \
            -e "ssh -p ${PORT}" \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude 'backend/.venv' \
            --exclude 'extension/node_modules' \
            --exclude '.env' \
            --exclude '**/__pycache__' \
            --exclude '.pytest_cache' \
            ./ "${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/"

      - name: Pull image and restart stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE: ${{ needs.build.outputs.image }}
          ENABLE_BOT: ${{ vars.ENABLE_BOT }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          BOT_FLAG="${ENABLE_BOT:-false}"
          ssh -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            env \
            DEPLOY_PATH="${DEPLOY_PATH}" \
            IMAGE="${IMAGE}" \
            ENABLE_BOT="${BOT_FLAG}" \
            GHCR_USER="${GHCR_USER}" \
            GHCR_TOKEN="${GHCR_TOKEN}" \
            bash -s <<'EOF'
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
          chmod +x scripts/deploy.sh
          CLIPERRY_IMAGE="${IMAGE}" \
            ENABLE_BOT="${ENABLE_BOT}" \
            HEALTH_URL="http://127.0.0.1:8000" \
            ./scripts/deploy.sh
          EOF

  healthcheck:
    name: Healthcheck
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Public readiness probe
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          URL="${HEALTHCHECK_URL%/}"
          echo "Checking ${URL}/ready"
          for i in $(seq 1 30); do
            if curl -fsS "${URL}/ready"; then
              echo
              echo "Healthcheck OK"
              exit 0
            fi
            echo "Attempt $i/30 failed..."
            sleep 5
          done
          echo "Public healthcheck failed" >&2
          exit 1
